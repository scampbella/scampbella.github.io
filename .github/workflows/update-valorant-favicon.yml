name: Update Valorant Favicon

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: update-valorant-favicon
  cancel-in-progress: true

jobs:
  update-favicon:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Update favicon image
        env:
          HENRIKDEV_API_KEY: ${{ secrets.HENRIKDEV_API_KEY }}
        run: node scripts/update-valorant-favicon.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add icons/favicon-rank.png valorant-favicon-status.json
          git commit -m "Update Valorant favicon"
          git push
